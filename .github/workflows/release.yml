name: Build and push release

on:
  release:
    types: [published]

jobs:
  build:
    name: Build solution
    runs-on: [self-hosted, nix, linux]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set IMAGE_NAME
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY##*/}" >> $GITHUB_ENV

      - name: Build image
        env: IMAGE_NAME
        run: |
          nix develop --command just build-image $IMAGE_NAME ${{ github.event.release.tag_name }}

      - name: Push image
        env: IMAGE_NAME
        run: |
          nix develop --command just push-image $IMAGE_NAME ${{ github.event.release.tag_name }}
