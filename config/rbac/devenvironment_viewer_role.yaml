# This rule is not used by the project mach-k8s-devenv-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to dev.machinology.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: mach-k8s-devenv-controller
    app.kubernetes.io/managed-by: kustomize
  name: devenvironment-viewer-role
rules:
- apiGroups:
  - dev.machinology.dev
  resources:
  - devenvironments
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - dev.machinology.dev
  resources:
  - devenvironments/status
  verbs:
  - get
