# This rule is not used by the project mach-k8s-devenv-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the dev.machinology.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: mach-k8s-devenv-controller
    app.kubernetes.io/managed-by: kustomize
  name: devenvironmentconfig-editor-role
rules:
- apiGroups:
  - dev.machinology.dev
  resources:
  - devenvironmentconfigs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - dev.machinology.dev
  resources:
  - devenvironmentconfigs/status
  verbs:
  - get
