# This rule is not used by the project mach-k8s-devenv-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over dev.machinology.dev.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: mach-k8s-devenv-controller
    app.kubernetes.io/managed-by: kustomize
  name: devenvironment-admin-role
rules:
- apiGroups:
  - dev.machinology.dev
  resources:
  - devenvironments
  verbs:
  - '*'
- apiGroups:
  - dev.machinology.dev
  resources:
  - devenvironments/status
  verbs:
  - get
