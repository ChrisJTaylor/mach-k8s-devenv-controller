---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - dev.machinology.dev
  resources:
  - devenvironmentconfigs
  - devenvironments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - dev.machinology.dev
  resources:
  - devenvironmentconfigs/finalizers
  - devenvironments/finalizers
  verbs:
  - update
- apiGroups:
  - dev.machinology.dev
  resources:
  - devenvironmentconfigs/status
  - devenvironments/status
  verbs:
  - get
  - patch
  - update
